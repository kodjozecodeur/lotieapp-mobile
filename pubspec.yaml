# pubspec.yaml - Complete Dependencies List for LotieApp

name: lotie_app
description: Delivery marketplace app for local merchants in Togo

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ===== STATE MANAGEMENT =====
  provider: ^6.1.1 # Simple state management
  # Alternative: riverpod: ^2.4.9     # More advanced state management

  # ===== HTTP & API CALLS =====
  http: ^1.1.2 # Basic HTTP requests
  dio: ^5.4.0 # Advanced HTTP client with interceptors

  # ===== NAVIGATION =====
  go_router: ^16.2.1 # Modern navigation solution

  # ===== UI COMPONENTS =====
  flutter_svg: ^2.0.9 # SVG image support
  cached_network_image: ^3.3.1 # Image caching
  shimmer: ^3.0.0 # Loading skeleton animation
  lottie: ^3.0.0 # Lottie animations
  flutter_staggered_grid_view: ^0.7.0 # Advanced grid layouts

  # ===== STORAGE =====
  shared_preferences: ^2.2.2 # Simple key-value storage
  hive: ^2.2.3 # Local database
  hive_flutter: ^1.1.0 # Hive Flutter integration

  # ===== LOCATION & MAPS =====
  geolocator: ^14.0.2 # GPS location services
  geocoding: ^4.0.0 # Address to coordinates conversion
  google_maps_flutter: ^2.5.3 # Google Maps (for delivery tracking)
  location: ^8.0.1 # Location permissions and services

  # ===== PERMISSIONS =====
  permission_handler: ^12.0.1 # Handle app permissions

  # ===== UTILITIES =====
  intl: ^0.20.2 # Internationalization and date formatting
  uuid: ^4.2.2 # Generate unique IDs
  url_launcher: ^6.2.2 # Launch URLs, make phone calls
  package_info_plus: ^8.3.1 # App version info
  device_info_plus: ^11.5.0 # Device information

  # ===== FORMS & VALIDATION =====
  flutter_form_builder: ^10.2.0 # Form building
  form_builder_validators: ^11.2.0 # Form validation

  # ===== NOTIFICATIONS =====
  # firebase_messaging: ^16.0.1 # Push notifications (when ready)
  flutter_local_notifications: ^19.4.1 # Local notifications

  # ===== IMAGE HANDLING =====
  image_picker: ^1.0.6 # Pick images from gallery/camera
  image_cropper: ^9.1.0 # Crop images

  # ===== PAYMENT =====
  # webview_flutter: ^4.4.4           # For payment webviews (add when Fedapay ready)

  # ===== PHONE FUNCTIONS =====
  flutter_phone_direct_caller: ^2.1.1 # Direct phone calling

  # ===== ANIMATIONS =====
  animations: ^2.0.11 # Page transition animations

  # ===== ICONS =====
  cupertino_icons: ^1.0.6 # iOS style icons

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0 # Linting rules
  build_runner: ^2.4.7 # Code generation
  hive_generator: ^2.0.1 # Generate Hive adapters
  json_annotation: ^4.8.1 # JSON serialization annotations
  json_serializable: ^6.7.1 # JSON serialization code generation

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Custom fonts (optional)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
